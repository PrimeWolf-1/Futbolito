<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futbolito</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      font-family: 'Georgia', serif;
      color: #f0e8d0;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── Intro Screen ── */
    #screen-intro {
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      cursor: pointer;
    }

    #intro-stadium {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 50% 40%, #2d5a1b 0%, #1a3a10 30%, #0d2008 60%, #050e03 100%),
        repeating-radial-gradient(circle at 50% 50%, transparent 0px, transparent 12px, rgba(255,255,255,0.03) 12px, rgba(255,255,255,0.03) 13px);
    }

    #intro-board {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 50%,
        #3d7a28 0%,
        #2d5a1b 40%,
        #1a3a10 70%,
        #0d2008 100%
      );
      opacity: 0;
    }

    .intro-board-inner {
      text-align: center;
    }

    .intro-title {
      font-size: 5rem;
      font-weight: 900;
      font-family: Impact, 'Arial Black', sans-serif;
      color: #f4e8c1;
      letter-spacing: 12px;
      text-shadow:
        0 0 30px rgba(244, 232, 193, 0.4),
        2px 2px 0 rgba(0,0,0,0.8);
      text-transform: uppercase;
    }

    .intro-subtitle {
      font-size: 1.2rem;
      font-family: monospace;
      color: #a89060;
      letter-spacing: 8px;
      margin-top: 8px;
      text-transform: lowercase;
    }

    .intro-skip-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: monospace;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 3px;
      animation: fadeInHint 1s ease 0.5s both;
    }

    @keyframes fadeInHint {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes introDive {
      0%   { transform: scale(1) translateY(0);     opacity: 0.7; }
      60%  { transform: scale(4) translateY(-10%);  opacity: 1; }
      100% { transform: scale(12) translateY(-20%); opacity: 0; }
    }

    @keyframes stadiumFadeOut {
      0%   { opacity: 1; }
      40%  { opacity: 0.8; }
      100% { opacity: 0; }
    }

    @keyframes boardFadeIn {
      0%   { opacity: 0; }
      50%  { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ── Setup Screen ── */
    #screen-setup {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #181510;
    }

    #screen-setup h2 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: #c8a96e;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .setup-columns {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      width: 100%;
      max-width: 820px;
      gap: 2rem;
    }

    .player-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(200, 169, 110, 0.2);
      border-radius: 6px;
      padding: 1.5rem 1rem;
    }

    .player-column h3 {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      color: #c8a96e;
      text-transform: uppercase;
    }

    .player-column input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0e0c09;
      border: 1px solid #5a4a30;
      border-radius: 4px;
      color: #f0e8d0;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-column input[type="text"]:focus {
      border-color: #c8a96e;
    }

    .player-column input[type="text"]::placeholder {
      color: #5a4a30;
    }

    .formation-cards {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
    }

    .formation-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem;
      background: #0e0c09;
      border: 2px solid #3a2e1a;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .formation-card:hover {
      border-color: #7a6040;
      background: #141008;
    }

    .formation-card.selected {
      border-color: #f4a261;
      background: #1a1005;
    }

    .formation-card span {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: #a08060;
      text-transform: uppercase;
    }

    .formation-card.selected span {
      color: #f4a261;
    }

    .formation-card canvas {
      display: block;
      border-radius: 3px;
    }

    #start-match {
      margin-top: 2rem;
      padding: 0.75rem 2.5rem;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f0e8d0;
      background: #3a2a10;
      border: 2px solid #c8a96e;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #start-match:hover {
      background: #c8a96e;
      color: #0e0c09;
    }

    /* ── Game Screen ── */
    #screen-game {
      position: relative;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #87CEEB 0%, #98D4A3 45%, #6B8E4E 100%);
      /* Sky blue fading to grass green — outdoor backyard feel */
    }

    #scoreboard {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 1.4rem;
      padding: 6px 20px;
      border-radius: 6px;
      font-family: monospace;
      letter-spacing: 2px;
      pointer-events: none;
    }

    #screen-game canvas {
      display: block;
      background: #2a4a2a;
      border: 3px solid #5a3e1b;
    }

    /* ── Goal Overlay ── */
    #goal-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #goal-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .goal-text {
      font-size: 5rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,220,50,0.9), 2px 2px 0 #000;
      letter-spacing: 6px;
      font-family: Impact, sans-serif;
    }
    .scorer-name {
      font-size: 2rem;
      color: #f4a261;
      text-shadow: 1px 1px 0 #000;
      margin-top: 8px;
      font-family: monospace;
      letter-spacing: 3px;
    }

    /* ── Win Screen ── */
    #screen-win {
      background: #1a1a1a;
      align-items: center;
      justify-content: center;
    }
    .win-content {
      text-align: center;
      color: #fff;
    }
    .win-trophy {
      font-size: 4rem;
      margin-bottom: 12px;
    }
    #win-name {
      font-size: 3.5rem;
      font-weight: 900;
      font-family: Impact, sans-serif;
      color: #f4a261;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .win-label {
      font-size: 1rem;
      letter-spacing: 6px;
      color: #aaa;
      margin: 8px 0 16px;
      font-family: monospace;
    }
    #win-score {
      font-size: 2rem;
      font-family: monospace;
      letter-spacing: 4px;
      color: #fff;
      margin-bottom: 32px;
    }
    #play-again {
      background: #2d5a1b;
      color: #fff;
      border: 2px solid #d4c9a8;
      padding: 12px 36px;
      font-size: 1.1rem;
      font-family: monospace;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
    }
    #play-again:hover {
      background: #3d7a2b;
    }
  </style>
</head>
<body>

  <!-- Intro Screen -->
  <div id="screen-intro" class="screen">
    <div id="intro-stadium"></div>
    <div id="intro-board">
      <div class="intro-board-inner">
        <div class="intro-title">FUTBOLITO</div>
        <div class="intro-subtitle">El juego del barrio</div>
      </div>
    </div>
    <div class="intro-skip-hint">click or press any key to skip</div>
  </div>

  <!-- Setup Screen -->
  <div id="screen-setup" class="screen">
    <h2>Match Setup</h2>
    <div class="setup-columns">
      <!-- Player 1 -->
      <div class="player-column" id="player1-col">
        <h3>Player 1</h3>
        <input type="text" id="player1-name" placeholder="Enter name" />
        <div class="formation-cards">
          <div class="formation-card" data-formation="4-3-3">
            <span>4-3-3</span>
            <canvas width="120" height="80"></canvas>
          </div>
          <div class="formation-card" data-formation="3-5-2">
            <span>3-5-2</span>
            <canvas width="120" height="80"></canvas>
          </div>
        </div>
      </div>
      <!-- Player 2 -->
      <div class="player-column" id="player2-col">
        <h3>Player 2</h3>
        <input type="text" id="player2-name" placeholder="Enter name" />
        <div class="formation-cards">
          <div class="formation-card" data-formation="4-3-3">
            <span>4-3-3</span>
            <canvas width="120" height="80"></canvas>
          </div>
          <div class="formation-card" data-formation="3-5-2">
            <span>3-5-2</span>
            <canvas width="120" height="80"></canvas>
          </div>
        </div>
      </div>
    </div>
    <button id="start-match">Start Match</button>
  </div>

  <!-- Game Screen -->
  <div id="screen-game" class="screen">
    <div id="scoreboard"></div>
    <canvas id="game-canvas"></canvas>
    <div id="goal-overlay">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Win Screen -->
  <div id="screen-win" class="screen">
    <div class="win-content">
      <div class="win-trophy">🏆</div>
      <div id="win-name">Winner</div>
      <div class="win-label">WINS THE MATCH</div>
      <div id="win-score">0 — 0</div>
      <button id="play-again">Play Again</button>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // CONFIG — game constants
    // ─────────────────────────────────────────────
    const CONFIG = {
      CANVAS_WIDTH: 900,
      CANVAS_HEIGHT: 600,
      MAX_SPEED: 30,
      MAX_DRAG_DISTANCE: 120,
      VELOCITY_THRESHOLD: 0.5,
    };

    // ─────────────────────────────────────────────
    // STATE — single source of truth
    // ─────────────────────────────────────────────
    const STATE = {
      playerNames: ['', ''],
      playerFormations: [null, null],
      scores: [0, 0],
      activePlayer: 0,
      turnStartTime: null,
      idleGlowActive: false,
      isDragging: false,
      dragCurrent: null,
      aimTarget: null,
      marbleDirty: false,
      marbleWasMoving: false,
      marbleTrail: [],
      droppingContactHandled: false,
      celebrationActive: false,
      celebrationStartTime: null,
      celebrationTimer: null,
      confettiParticles: [],
      nailJumpActive: false,
      pendingWin: null,
      birdActive: false,
      birdFrame: 0,
      bird: { x: 0, y: 0, hasDropped: false },
      dropping: null,
      droppingTimer: null,
      boardSkin: null,
      ambientScene: null,
    };

    // ─────────────────────────────────────────────
    // Formations — normalized [0,1] coords per player half
    // ─────────────────────────────────────────────
    const Formations = {
      "4-3-3": [
        { x: 0.1, y: 0.5 },
        { x: 0.3, y: 0.2 }, { x: 0.3, y: 0.4 }, { x: 0.3, y: 0.6 }, { x: 0.3, y: 0.8 },
        { x: 0.55, y: 0.25 }, { x: 0.55, y: 0.5 }, { x: 0.55, y: 0.75 },
        { x: 0.75, y: 0.2 }, { x: 0.75, y: 0.5 }, { x: 0.75, y: 0.8 },
      ],
      "3-5-2": [
        { x: 0.1, y: 0.5 },
        { x: 0.3, y: 0.25 }, { x: 0.3, y: 0.5 }, { x: 0.3, y: 0.75 },
        { x: 0.52, y: 0.1 }, { x: 0.52, y: 0.3 }, { x: 0.52, y: 0.5 }, { x: 0.52, y: 0.7 }, { x: 0.52, y: 0.9 },
        { x: 0.75, y: 0.35 }, { x: 0.75, y: 0.65 },
      ],
    };

    // ─────────────────────────────────────────────
    // Screens — show/hide controller
    // ─────────────────────────────────────────────
    const Screens = {
      show(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        const target = document.getElementById(id);
        if (target) {
          target.style.display = 'flex';
        }
      }
    };

    // ─────────────────────────────────────────────
    // Canvas setup
    // ─────────────────────────────────────────────
    const canvas = document.getElementById('game-canvas');
    canvas.width = CONFIG.CANVAS_WIDTH;
    canvas.height = CONFIG.CANVAS_HEIGHT;
    const ctx = canvas.getContext('2d');

    // ─────────────────────────────────────────────
    // Grain texture — generated once into offscreen canvas
    // ─────────────────────────────────────────────
    const grainCanvas = document.createElement('canvas');
    grainCanvas.width = CONFIG.CANVAS_WIDTH;
    grainCanvas.height = CONFIG.CANVAS_HEIGHT;
    const grainCtx = grainCanvas.getContext('2d');
    for (let i = 0; i < 1200; i++) {
      const gx = 22 + Math.random() * (CONFIG.CANVAS_WIDTH - 44);
      const gy = 22 + Math.random() * (CONFIG.CANVAS_HEIGHT - 44);
      grainCtx.beginPath();
      grainCtx.arc(gx, gy, Math.random() * 1.5, 0, Math.PI * 2);
      grainCtx.fillStyle = `rgba(0,0,0,${Math.random() * 0.1})`;
      grainCtx.fill();
    }

    // ─────────────────────────────────────────────
    // Physics engine — Matter.js
    // ─────────────────────────────────────────────
    const { Engine, Bodies, Body, Composite, Events } = Matter;

    const engine = Engine.create();
    engine.gravity.y = 0; // top-down view, no gravity
    const world = engine.world;

    // Walls — placed just outside canvas edges so marble bounces off internal border
    const wallTop    = Bodies.rectangle(CONFIG.CANVAS_WIDTH / 2, -10,           CONFIG.CANVAS_WIDTH + 40, 20, { isStatic: true, restitution: 0.6, label: 'wall-top' });
    const wallBottom = Bodies.rectangle(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT + 10, CONFIG.CANVAS_WIDTH + 40, 20, { isStatic: true, restitution: 0.6, label: 'wall-bottom' });
    const wallLeft   = Bodies.rectangle(-20, CONFIG.CANVAS_HEIGHT / 2,          20, CONFIG.CANVAS_HEIGHT + 40, { isStatic: true, restitution: 0.6, label: 'wall-left' });
    const wallRight  = Bodies.rectangle(CONFIG.CANVAS_WIDTH + 20, CONFIG.CANVAS_HEIGHT / 2, 20, CONFIG.CANVAS_HEIGHT + 40, { isStatic: true, restitution: 0.6, label: 'wall-right' });

    // Goal sensors — just inside each goal opening
    const goalP1 = Bodies.rectangle(8, CONFIG.CANVAS_HEIGHT / 2, 20, 60, { isStatic: true, isSensor: true, label: 'goal-p1' });
    const goalP2 = Bodies.rectangle(892, CONFIG.CANVAS_HEIGHT / 2, 20, 60, { isStatic: true, isSensor: true, label: 'goal-p2' });

    // Marble — exposed globally for console verification
    const marble = Bodies.circle(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 12, {
      restitution: 0.75,
      frictionAir: 0.015,
      label: 'marble',
    });

    // Add static bodies only (no nails yet — they're created in Game.init())
    Composite.add(world, [wallTop, wallBottom, wallLeft, wallRight, goalP1, goalP2, marble]);

    // Speed cap — enforced each frame
    const MAX_SPEED = CONFIG.MAX_SPEED;

    // ─────────────────────────────────────────────
    // Renderer — draw functions
    // ─────────────────────────────────────────────

    function drawStringSegment(ctx, x1, y1, x2, y2) {
      // Shadow
      ctx.beginPath();
      ctx.moveTo(x1 + 1, y1 + 1);
      ctx.lineTo(x2 + 1, y2 + 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 4;
      ctx.stroke();

      // String body
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = '#d4c9a8';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Highlight
      ctx.beginPath();
      ctx.moveTo(x1 - 0.5, y1 - 0.5);
      ctx.lineTo(x2 - 0.5, y2 - 0.5);
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawStringBorder() {
      const pad = 22;
      const W = CONFIG.CANVAS_WIDTH;
      const H = CONFIG.CANVAS_HEIGHT;
      const cy = H / 2;
      const goalHalf = 35;

      // Top border
      drawStringSegment(ctx, pad, pad, W - pad, pad);
      // Bottom border
      drawStringSegment(ctx, pad, H - pad, W - pad, H - pad);
      // Left border (split around goal)
      drawStringSegment(ctx, pad, pad, pad, cy - goalHalf);
      drawStringSegment(ctx, pad, cy + goalHalf, pad, H - pad);
      // Right border (split around goal)
      drawStringSegment(ctx, W - pad, pad, W - pad, cy - goalHalf);
      drawStringSegment(ctx, W - pad, cy + goalHalf, W - pad, H - pad);
    }

    function drawFieldLines() {
      const W = CONFIG.CANVAS_WIDTH;
      const H = CONFIG.CANVAS_HEIGHT;
      const BORDER = 22;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.5;

      // Center line (vertical) — from felt top to felt bottom
      ctx.beginPath();
      ctx.moveTo(450, BORDER + 8);
      ctx.lineTo(450, H - BORDER - 8);
      ctx.stroke();

      // Center circle
      ctx.beginPath();
      ctx.arc(450, 300, 60, 0, Math.PI * 2);
      ctx.stroke();

      // Center spot
      ctx.beginPath();
      ctx.arc(450, 300, 4, 0, Math.PI * 2);
      ctx.fill();

      // Left penalty area — inset from felt edge
      ctx.beginPath();
      ctx.strokeRect(BORDER, 180, 160, 240);

      // Right penalty area
      ctx.beginPath();
      ctx.strokeRect(W - BORDER - 160, 180, 160, 240);

      // Left goal area (6-yard box)
      ctx.beginPath();
      ctx.strokeRect(BORDER, 240, 90, 120);

      // Right goal area
      ctx.beginPath();
      ctx.strokeRect(W - BORDER - 90, 240, 90, 120);

      // Left penalty spot
      ctx.beginPath();
      ctx.arc(BORDER + 120, 300, 3, 0, Math.PI * 2);
      ctx.fill();

      // Right penalty spot
      ctx.beginPath();
      ctx.arc(W - BORDER - 120, 300, 3, 0, Math.PI * 2);
      ctx.fill();

      // Corner arcs — at felt corners
      const cx = BORDER + 8;
      const cy2 = BORDER + 8;
      // Top-left
      ctx.beginPath();
      ctx.arc(cx, cy2, 15, 0, Math.PI / 2);
      ctx.stroke();
      // Top-right
      ctx.beginPath();
      ctx.arc(W - cx, cy2, 15, Math.PI / 2, Math.PI);
      ctx.stroke();
      // Bottom-left
      ctx.beginPath();
      ctx.arc(cx, H - cy2, 15, -Math.PI / 2, 0);
      ctx.stroke();
      // Bottom-right
      ctx.beginPath();
      ctx.arc(W - cx, H - cy2, 15, Math.PI, Math.PI * 1.5);
      ctx.stroke();

      ctx.restore();
    }

    function drawGoals() {
      const W = CONFIG.CANVAS_WIDTH;
      const H = CONFIG.CANVAS_HEIGHT;
      const cy = H / 2;
      const goalHalf = 35; // half goal mouth height (matches sensor ~70px total)
      const BORDER = 22;

      // === LEFT GOAL ===
      // Goal posts (vertical bars on left edge)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';

      // Top post
      ctx.beginPath();
      ctx.moveTo(BORDER, cy - goalHalf);
      ctx.lineTo(BORDER - 14, cy - goalHalf);
      ctx.stroke();

      // Bottom post
      ctx.beginPath();
      ctx.moveTo(BORDER, cy + goalHalf);
      ctx.lineTo(BORDER - 14, cy + goalHalf);
      ctx.stroke();

      // Back of net (connecting bar)
      ctx.beginPath();
      ctx.moveTo(BORDER - 14, cy - goalHalf);
      ctx.lineTo(BORDER - 14, cy + goalHalf);
      ctx.stroke();

      // Net lines (horizontal, inside goal box)
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 0.8;
      for (let ny = cy - goalHalf + 8; ny < cy + goalHalf; ny += 10) {
        ctx.beginPath();
        ctx.moveTo(BORDER - 13, ny);
        ctx.lineTo(BORDER, ny);
        ctx.stroke();
      }
      // Net vertical lines
      for (let nx = BORDER - 13; nx < BORDER; nx += 6) {
        ctx.beginPath();
        ctx.moveTo(nx, cy - goalHalf);
        ctx.lineTo(nx, cy + goalHalf);
        ctx.stroke();
      }

      // Goal post balls (ends of posts)
      ctx.fillStyle = '#c8c8c8';
      [[BORDER - 14, cy - goalHalf], [BORDER - 14, cy + goalHalf]].forEach(([px, py]) => {
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fill();
      });

      // === RIGHT GOAL === (mirror)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';

      ctx.beginPath();
      ctx.moveTo(W - BORDER, cy - goalHalf);
      ctx.lineTo(W - BORDER + 14, cy - goalHalf);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(W - BORDER, cy + goalHalf);
      ctx.lineTo(W - BORDER + 14, cy + goalHalf);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(W - BORDER + 14, cy - goalHalf);
      ctx.lineTo(W - BORDER + 14, cy + goalHalf);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 0.8;
      for (let ny = cy - goalHalf + 8; ny < cy + goalHalf; ny += 10) {
        ctx.beginPath();
        ctx.moveTo(W - BORDER + 1, ny);
        ctx.lineTo(W - BORDER + 13, ny);
        ctx.stroke();
      }
      for (let nx = W - BORDER + 1; nx < W - BORDER + 13; nx += 6) {
        ctx.beginPath();
        ctx.moveTo(nx, cy - goalHalf);
        ctx.lineTo(nx, cy + goalHalf);
        ctx.stroke();
      }

      ctx.fillStyle = '#c8c8c8';
      [[W - BORDER + 14, cy - goalHalf], [W - BORDER + 14, cy + goalHalf]].forEach(([px, py]) => {
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawBoard() {
      const W = CONFIG.CANVAS_WIDTH;
      const H = CONFIG.CANVAS_HEIGHT;
      const BORDER = 22; // wood frame width

      // === WOODEN FRAME (outer border) ===
      // Dark walnut-ish wood with grain lines
      const woodGrad = ctx.createLinearGradient(0, 0, W, H);
      woodGrad.addColorStop(0,   '#5c3a1e');
      woodGrad.addColorStop(0.3, '#7a4f2a');
      woodGrad.addColorStop(0.6, '#6b4020');
      woodGrad.addColorStop(1,   '#4a2e10');
      ctx.fillStyle = woodGrad;
      ctx.fillRect(0, 0, W, H);

      // Wood grain lines
      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 18; i++) {
        const xLine = (i / 18) * W + Math.sin(i * 0.7) * 4;
        ctx.beginPath();
        ctx.moveTo(xLine, 0);
        ctx.lineTo(xLine + 8, H);
        ctx.stroke();
      }
      ctx.restore();

      // Wood highlight (top edge lighter)
      const woodHi = ctx.createLinearGradient(0, 0, 0, BORDER);
      woodHi.addColorStop(0, 'rgba(255,220,150,0.18)');
      woodHi.addColorStop(1, 'rgba(255,220,150,0)');
      ctx.fillStyle = woodHi;
      ctx.fillRect(0, 0, W, BORDER);

      // === FELT PLAYING SURFACE ===
      ctx.fillStyle = '#2d5a1b';
      ctx.fillRect(BORDER, BORDER, W - BORDER*2, H - BORDER*2);

      // Felt grain
      ctx.drawImage(grainCanvas, 0, 0);

      // === FIELD LINES ===
      drawFieldLines();

      // === NYLON STRING BORDER ===
      drawStringBorder();

      // === GOAL STRUCTURES ===
      drawGoals();
    }

    function drawMarble() {
      const x = marble.position.x;
      const y = marble.position.y;
      const r = 12;

      // Draw trail if dirty
      if (STATE.marbleDirty && STATE.marbleTrail.length > 0) {
        STATE.marbleTrail.forEach((pos, i) => {
          const alpha = (i / STATE.marbleTrail.length) * 0.35;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, r * 0.85, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(120, 90, 20, ${alpha})`;
          ctx.fill();
        });
      }

      // Update trail
      if (STATE.marbleDirty) {
        STATE.marbleTrail.push({ x, y });
        if (STATE.marbleTrail.length > 6) STATE.marbleTrail.shift();
      }

      // --- Outer shadow (marble on board)
      ctx.beginPath();
      ctx.arc(x + 2, y + 3, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fill();

      // --- Glass body — deep blue with transparency layers
      const bodyGrad = ctx.createRadialGradient(x - 3, y - 3, 1, x, y, r);
      bodyGrad.addColorStop(0,    '#c8e8ff');  // light blue
      bodyGrad.addColorStop(0.15, '#4a9adf');  // sky blue
      bodyGrad.addColorStop(0.5,  '#1a5aaa');  // mid blue
      bodyGrad.addColorStop(0.85, '#0a2a66');  // deep blue
      bodyGrad.addColorStop(1,    '#040f2a');  // near-black edge
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = bodyGrad;
      ctx.fill();

      // --- Inner glow (swirl color — gives the glass marble its characteristic look)
      ctx.beginPath();
      ctx.arc(x + 2, y + 2, r * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
      ctx.fill();

      // --- Primary specular highlight (large, soft — main light source)
      const hiGrad = ctx.createRadialGradient(x - 4, y - 4, 0, x - 4, y - 4, r * 0.65);
      hiGrad.addColorStop(0, 'rgba(255,255,255,0.85)');
      hiGrad.addColorStop(0.4, 'rgba(255,255,255,0.25)');
      hiGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = hiGrad;
      ctx.fill();

      // --- Secondary specular (small sharp glint — glass edge refraction)
      ctx.beginPath();
      ctx.arc(x - 5, y - 5, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();

      // --- Rim darkening (makes it look spherical, not flat)
      const rimGrad = ctx.createRadialGradient(x, y, r * 0.6, x, y, r);
      rimGrad.addColorStop(0, 'rgba(0,0,0,0)');
      rimGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = rimGrad;
      ctx.fill();
    }

    function drawNails() {
      const bodies = Matter.Composite.allBodies(world);

      // Compute nail jump offset during celebration
      let jumpY = 0;
      if (STATE.nailJumpActive && STATE.celebrationStartTime) {
        const t = (Date.now() - STATE.celebrationStartTime) / 1000;
        jumpY = Math.sin(t * 12) * 6 * Math.max(0, 1 - t / 0.6);
      }

      bodies.forEach(body => {
        if (body.label !== 'nail') return;
        const cx = body.position.x;
        const cy = body.position.y + jumpY;
        const isP2 = body.playerIndex === 1;

        // Team color palette
        const headLight  = isP2 ? '#ff9999' : '#99ccff';
        const headMid    = isP2 ? '#cc3333' : '#2266cc';
        const headDark   = isP2 ? '#661111' : '#0a2a66';
        const rimColor   = isP2 ? '#440000' : '#001144';

        // --- Cylindrical body / shaft shadow (nail sticking up from board)
        ctx.save();
        ctx.translate(cx + 2, cy + 5);
        ctx.scale(0.6, 1);
        const shaftGrad = ctx.createLinearGradient(-6, 0, 6, 0);
        shaftGrad.addColorStop(0, 'rgba(0,0,0,0.6)');
        shaftGrad.addColorStop(0.4, isP2 ? 'rgba(150,50,50,0.5)' : 'rgba(50,80,150,0.5)');
        shaftGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
        ctx.beginPath();
        ctx.ellipse(0, 0, 7, 10, 0, 0, Math.PI * 2);
        ctx.fillStyle = shaftGrad;
        ctx.fill();
        ctx.restore();

        // --- Drop shadow on board
        ctx.beginPath();
        ctx.ellipse(cx + 3, cy + 4, 10, 7, 0.3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fill();

        // --- Nail head (the flat circular top of the nail)
        const headGrad = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, 10);
        headGrad.addColorStop(0,   headLight);
        headGrad.addColorStop(0.4, headMid);
        headGrad.addColorStop(0.85, headDark);
        headGrad.addColorStop(1,   rimColor);
        ctx.beginPath();
        ctx.arc(cx, cy, 10, 0, Math.PI * 2);
        ctx.fillStyle = headGrad;
        ctx.fill();

        // --- Nail head rim
        ctx.beginPath();
        ctx.arc(cx, cy, 10, 0, Math.PI * 2);
        ctx.strokeStyle = rimColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // --- Cross-slot on nail head (like a flathead screw, gives it the handmade feel)
        ctx.save();
        ctx.strokeStyle = 'rgba(0,0,0,0.45)';
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        // Horizontal slot
        ctx.beginPath();
        ctx.moveTo(cx - 5, cy);
        ctx.lineTo(cx + 5, cy);
        ctx.stroke();
        // Vertical slot
        ctx.beginPath();
        ctx.moveTo(cx, cy - 5);
        ctx.lineTo(cx, cy + 5);
        ctx.stroke();
        ctx.restore();

        // --- Specular highlight (bright glint top-left)
        ctx.beginPath();
        ctx.arc(cx - 3.5, cy - 3.5, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.fill();
      });
    }

    function drawAimLine() {
      if (!STATE.isDragging || !STATE.aimTarget) return;
      ctx.save();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(marble.position.x, marble.position.y);
      ctx.lineTo(STATE.aimTarget.x, STATE.aimTarget.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawIdleGlow() {
      if (!STATE.idleGlowActive) return;
      const pulse = 0.4 + 0.4 * Math.sin(Date.now() / 200);
      ctx.beginPath();
      ctx.arc(marble.position.x, marble.position.y, 20, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(80, 220, 80, ${pulse})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    function drawCelebration() {
      if (!STATE.celebrationActive) return;
      STATE.confettiParticles.forEach(p => {
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.rotationSpeed;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      });
    }
    function drawBird()        {}

    // ─────────────────────────────────────────────
    // Game loop
    // ─────────────────────────────────────────────
    function gameLoop() {
      if (!Game._loopRunning) return;

      // Update physics
      Engine.update(engine, 1000 / 60);

      // Speed cap
      const vel = marble.velocity;
      const speed = Math.sqrt(vel.x ** 2 + vel.y ** 2);
      if (speed > MAX_SPEED) {
        const scale = MAX_SPEED / speed;
        Body.setVelocity(marble, { x: vel.x * scale, y: vel.y * scale });
      }

      // Turn flow — track marble movement and switch turns when it stops
      if (speed > CONFIG.VELOCITY_THRESHOLD && !STATE.isDragging && !STATE.celebrationActive) {
        STATE.marbleWasMoving = true;
      }
      if (STATE.marbleWasMoving && speed < CONFIG.VELOCITY_THRESHOLD && !STATE.isDragging && !STATE.celebrationActive) {
        STATE.marbleWasMoving = false;
        Game.endTurn();
      }

      // Idle check — glow after 5 seconds of inactivity
      if (STATE.turnStartTime && Date.now() - STATE.turnStartTime > 5000 && !STATE.isDragging) {
        STATE.idleGlowActive = true;
      }

      // Clear and redraw
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBoard();
      drawNails();
      drawMarble();
      drawAimLine();
      drawIdleGlow();
      drawCelebration();
      drawBird();

      requestAnimationFrame(gameLoop);
    }

    // ─────────────────────────────────────────────
    // Game — init and loop control
    // ─────────────────────────────────────────────
    const Game = {
      _loopRunning: false,

      init() {
        // Clear existing nail bodies from world
        const nailBodies = Composite.allBodies(world).filter(b => b.label === 'nail');
        nailBodies.forEach(nail => Composite.remove(world, nail));

        // Create nail bodies for both players
        const halfWidth = CONFIG.CANVAS_WIDTH / 2;
        [STATE.playerFormations[0], STATE.playerFormations[1]].forEach((formKey, playerIdx) => {
          const coords = Formations[formKey];
          coords.forEach(coord => {
            let px, py;
            if (playerIdx === 0) {
              px = coord.x * halfWidth;
              py = coord.y * CONFIG.CANVAS_HEIGHT;
            } else {
              // Player 2 mirrored
              const mirroredX = 1 - coord.x;
              px = mirroredX * halfWidth + halfWidth;
              py = coord.y * CONFIG.CANVAS_HEIGHT;
            }
            const nail = Bodies.circle(px, py, 8, {
              isStatic: true,
              restitution: 0.7,
              label: 'nail',
            });
            nail.playerIndex = playerIdx;
            Composite.add(world, nail);
          });
        });

        // Assign board skin and scene randomly
        STATE.boardSkin = Math.random() < 0.5 ? 'worn-felt' : 'rustic-wood';
        STATE.ambientScene = Math.random() < 0.5 ? 'backyard' : 'street-night';

        // Reset marble to center
        Body.setPosition(marble, { x: CONFIG.CANVAS_WIDTH / 2, y: CONFIG.CANVAS_HEIGHT / 2 });
        Body.setVelocity(marble, { x: 0, y: 0 });

        // Set initial turn state
        STATE.activePlayer = 0;
        STATE.turnStartTime = Date.now();
        STATE.scores = [0, 0];

        // Update scoreboard
        document.getElementById('scoreboard').textContent = `${STATE.playerNames[0]} 0 — ${STATE.playerNames[1]} 0`;

        // Show game screen and start loop
        Screens.show('screen-game');
        if (!Game._loopRunning) {
          Game._loopRunning = true;
          gameLoop();
        }
      },

      endTurn() {
        STATE.marbleDirty = false;
        STATE.activePlayer = 1 - STATE.activePlayer;
        STATE.turnStartTime = Date.now();
        STATE.idleGlowActive = false;
        Body.set(marble, 'frictionAir', 0.015);
        STATE.droppingContactHandled = false;
      },

      onGoal(scoringPlayer) {
        if (STATE.celebrationActive) return; // prevent double-trigger
        STATE.scores[scoringPlayer - 1]++;
        // Update scoreboard immediately
        document.getElementById('scoreboard').textContent =
          `${STATE.playerNames[0]} ${STATE.scores[0]} — ${STATE.playerNames[1]} ${STATE.scores[1]}`;
        // Check win condition (item 7)
        if (STATE.scores[scoringPlayer - 1] >= 3) {
          STATE.pendingWin = scoringPlayer;
        }
        // Trigger celebration
        Celebration.trigger(scoringPlayer);
      },

      triggerWin(winner) {
        const winnerName = STATE.playerNames[winner - 1];
        const finalScore = `${STATE.playerNames[0]} ${STATE.scores[0]} — ${STATE.playerNames[1]} ${STATE.scores[1]}`;
        document.getElementById('win-name').textContent = winnerName;
        document.getElementById('win-score').textContent = finalScore;
        Screens.show('screen-win');
      },

      reset() {
        // Stop the game loop
        Game._loopRunning = false;

        // Remove all nail bodies (keep marble, walls, and goal sensors)
        const toRemove = Composite.allBodies(world).filter(b => b.label === 'nail');
        toRemove.forEach(b => Composite.remove(world, b));

        // Reset marble position and velocity
        Body.setPosition(marble, { x: CONFIG.CANVAS_WIDTH / 2, y: CONFIG.CANVAS_HEIGHT / 2 });
        Body.setVelocity(marble, { x: 0, y: 0 });

        // Ensure marble is in the world (in case it was removed)
        if (!Composite.allBodies(world).includes(marble)) {
          Composite.add(world, marble);
        }

        // Reset scores and all state
        STATE.scores = [0, 0];
        STATE.celebrationActive = false;
        STATE.confettiParticles = [];
        STATE.nailJumpActive = false;
        STATE.celebrationTimer = null;
        STATE.pendingWin = null;
        STATE.birdActive = false;
        STATE.dropping = null;
        STATE.marbleDirty = false;
        STATE.marbleTrail = [];
        STATE.idleGlowActive = false;
        STATE.isDragging = false;
        STATE.marbleWasMoving = false;
      },
    };

    // ─────────────────────────────────────────────
    // Celebration — goal celebration system (item 6)
    // ─────────────────────────────────────────────
    const Celebration = {
      _skipHandler: null,

      trigger(scoringPlayer) {
        STATE.celebrationActive = true;
        STATE.celebrationStartTime = Date.now();

        // Spawn confetti
        STATE.confettiParticles = Array.from({ length: 60 }, () => ({
          x: marble.position.x,
          y: marble.position.y,
          vx: (Math.random() - 0.5) * 12,
          vy: Math.random() * -12 - 2,
          gravity: 0.35,
          color: ['#e63946','#f4a261','#2a9d8f','#e9c46a','#ffffff'][Math.floor(Math.random()*5)],
          size: 4 + Math.random() * 5,
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 0.2
        }));

        STATE.nailJumpActive = true;

        // Show goal text overlay
        const overlay = document.getElementById('goal-overlay');
        overlay.innerHTML = `<div class="goal-text">GOAL!!</div><div class="scorer-name">${STATE.playerNames[scoringPlayer - 1]}</div>`;
        overlay.style.display = 'flex';
        // Force reflow then add visible class for CSS transition
        overlay.offsetHeight;
        overlay.classList.add('visible');

        // Reset marble to center
        Matter.Body.setPosition(marble, { x: CONFIG.CANVAS_WIDTH / 2, y: CONFIG.CANVAS_HEIGHT / 2 });
        Matter.Body.setVelocity(marble, { x: 0, y: 0 });
        STATE.marbleWasMoving = false;

        // Auto-end after 3 seconds
        STATE.celebrationTimer = setTimeout(() => this.end(), 3000);

        // Click to skip
        this._skipHandler = () => this.end();
        canvas.addEventListener('click', this._skipHandler);
      },

      end() {
        if (!STATE.celebrationActive) return;
        clearTimeout(STATE.celebrationTimer);
        canvas.removeEventListener('click', this._skipHandler);
        STATE.celebrationActive = false;
        STATE.confettiParticles = [];
        STATE.nailJumpActive = false;
        STATE.celebrationTimer = null;

        // Hide goal text
        const overlay = document.getElementById('goal-overlay');
        overlay.classList.remove('visible');
        overlay.style.display = 'none';
        overlay.innerHTML = '';

        if (STATE.pendingWin) {
          const winner = STATE.pendingWin;
          STATE.pendingWin = null;
          Game.triggerWin(winner);
        } else {
          Game.endTurn();
        }
      }
    };

    // ─────────────────────────────────────────────
    // Goal detection — collision event listener
    // ─────────────────────────────────────────────
    Matter.Events.on(engine, 'collisionStart', (event) => {
      event.pairs.forEach(pair => {
        const labels = [pair.bodyA.label, pair.bodyB.label];
        if (labels.includes('marble') && labels.includes('goal-p1')) {
          Game.onGoal(2); // P2 scores when marble enters P1's goal (left end)
        }
        if (labels.includes('marble') && labels.includes('goal-p2')) {
          Game.onGoal(1); // P1 scores when marble enters P2's goal (right end)
        }
      });
    });

    // ─────────────────────────────────────────────
    // Slingshot — mouse input handlers
    // ─────────────────────────────────────────────
    canvas.addEventListener('mousedown', (e) => {
      if (!Game._loopRunning) return;

      // Only allow drag if marble is not already moving
      const vel = marble.velocity;
      const speed = Math.sqrt(vel.x ** 2 + vel.y ** 2);
      if (speed >= CONFIG.VELOCITY_THRESHOLD) return;

      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const dx = mouseX - marble.position.x;
      const dy = mouseY - marble.position.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < marble.circleRadius + 4) {
        STATE.isDragging = true;
        STATE.dragStart = { x: marble.position.x, y: marble.position.y };
        STATE.dragCurrent = { x: mouseX, y: mouseY };
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!STATE.isDragging) return;

      const rect = canvas.getBoundingClientRect();
      STATE.dragCurrent = { x: e.clientX - rect.left, y: e.clientY - rect.top };

      const aimVector = {
        x: marble.position.x - STATE.dragCurrent.x,
        y: marble.position.y - STATE.dragCurrent.y,
      };
      let magnitude = Math.sqrt(aimVector.x ** 2 + aimVector.y ** 2);

      if (magnitude > CONFIG.MAX_DRAG_DISTANCE) {
        const scale = CONFIG.MAX_DRAG_DISTANCE / magnitude;
        aimVector.x *= scale;
        aimVector.y *= scale;
        magnitude = CONFIG.MAX_DRAG_DISTANCE;
      }

      STATE.aimTarget = {
        x: marble.position.x + aimVector.x,
        y: marble.position.y + aimVector.y,
      };
    });

    canvas.addEventListener('mouseup', (e) => {
      if (!STATE.isDragging) return;

      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const aimVector = {
        x: marble.position.x - mouseX,
        y: marble.position.y - mouseY,
      };
      let magnitude = Math.sqrt(aimVector.x ** 2 + aimVector.y ** 2);

      if (magnitude > CONFIG.MAX_DRAG_DISTANCE) {
        const scale = CONFIG.MAX_DRAG_DISTANCE / magnitude;
        aimVector.x *= scale;
        aimVector.y *= scale;
        magnitude = CONFIG.MAX_DRAG_DISTANCE;
      }

      if (magnitude > 0) {
        const power = Math.min(magnitude / CONFIG.MAX_DRAG_DISTANCE, 1.0);
        const speed = power * CONFIG.MAX_SPEED;
        const velocity = {
          x: (aimVector.x / magnitude) * speed,
          y: (aimVector.y / magnitude) * speed,
        };
        Body.setVelocity(marble, velocity);
        STATE.marbleDirty = true;
      }

      STATE.isDragging = false;
      STATE.idleGlowActive = false;
      STATE.dragCurrent = null;
      STATE.aimTarget = null;
      STATE.turnStartTime = Date.now(); // reset idle timer on each shot
    });

    // ─────────────────────────────────────────────
    // Setup — formation preview + form handling
    // ─────────────────────────────────────────────
    const Setup = {
      selectedFormations: [null, null],

      init() {
        // Draw formation previews on all mini canvases
        document.querySelectorAll('.formation-card').forEach(card => {
          const formKey = card.dataset.formation;
          const miniCanvas = card.querySelector('canvas');
          this.drawPreview(miniCanvas, formKey);
        });

        // Formation card click handlers — Player 1
        document.querySelectorAll('#player1-col .formation-card').forEach(card => {
          card.addEventListener('click', () => {
            document.querySelectorAll('#player1-col .formation-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            Setup.selectedFormations[0] = card.dataset.formation;
          });
        });

        // Formation card click handlers — Player 2
        document.querySelectorAll('#player2-col .formation-card').forEach(card => {
          card.addEventListener('click', () => {
            document.querySelectorAll('#player2-col .formation-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            Setup.selectedFormations[1] = card.dataset.formation;
          });
        });

        // Start match button
        document.getElementById('start-match').addEventListener('click', () => {
          const name1 = document.getElementById('player1-name').value.trim();
          const name2 = document.getElementById('player2-name').value.trim();
          if (!name1 || !name2 || !Setup.selectedFormations[0] || !Setup.selectedFormations[1]) return;
          STATE.playerNames = [name1, name2];
          STATE.playerFormations = [...Setup.selectedFormations];
          Game.init();
        });
      },

      drawPreview(miniCanvas, formKey) {
        const ctx2 = miniCanvas.getContext('2d');
        ctx2.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
        ctx2.fillStyle = '#2d5a1b';
        ctx2.fillRect(0, 0, miniCanvas.width, miniCanvas.height);
        const coords = Formations[formKey];
        coords.forEach(coord => {
          ctx2.beginPath();
          ctx2.arc(coord.x * miniCanvas.width, coord.y * miniCanvas.height, 4, 0, Math.PI * 2);
          ctx2.fillStyle = '#888';
          ctx2.fill();
        });
      },
    };

    // ─────────────────────────────────────────────
    // Intro cinematic
    // ─────────────────────────────────────────────
    const Intro = {
      _clickHandler: null,
      _keyHandler: null,

      start() {
        const stadium = document.getElementById('intro-stadium');
        const board = document.getElementById('intro-board');

        stadium.style.animation = 'stadiumFadeOut 4.5s ease forwards';
        board.style.animation = 'boardFadeIn 4.5s ease forwards, introDive 4.5s ease forwards';

        this._clickHandler = () => this.skip();
        this._keyHandler = () => this.skip();
        document.addEventListener('click', this._clickHandler);
        document.addEventListener('keydown', this._keyHandler);

        board.addEventListener('animationend', (e) => {
          if (e.animationName === 'introDive') this.skip();
        }, { once: true });
      },

      skip() {
        document.removeEventListener('click', this._clickHandler);
        document.removeEventListener('keydown', this._keyHandler);

        const stadium = document.getElementById('intro-stadium');
        const board = document.getElementById('intro-board');
        stadium.style.animation = 'none';
        board.style.animation = 'none';

        Screens.show('screen-setup');
      }
    };

    // ─────────────────────────────────────────────
    // Boot — show intro, init setup
    // ─────────────────────────────────────────────
    Screens.show('screen-intro');

    Setup.init();
    Intro.start();

    // Play Again — reset game and return to setup with names pre-filled
    document.getElementById('play-again').addEventListener('click', () => {
      Game.reset();

      // Repopulate name inputs from STATE
      document.getElementById('player1-name').value = STATE.playerNames[0];
      document.getElementById('player2-name').value = STATE.playerNames[1];

      // Reset formation selections
      document.querySelectorAll('.formation-card').forEach(c => c.classList.remove('selected'));
      Setup.selectedFormations = [null, null];

      Screens.show('screen-setup');
    });

  </script>
</body>
</html>
