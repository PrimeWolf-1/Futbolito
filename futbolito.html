<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futbolito</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      font-family: 'Georgia', serif;
      color: #f0e8d0;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── Intro Screen ── */
    #screen-intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }

    #screen-intro h1 {
      font-size: clamp(4rem, 12vw, 9rem);
      letter-spacing: 0.1em;
      color: #f0e8d0;
      text-transform: uppercase;
      text-shadow:
        0 0 20px rgba(240, 232, 208, 0.4),
        4px 4px 0px #5a3e1b;
      animation: zoomIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    #screen-intro p {
      margin-top: 1.2rem;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: #a08060;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    @keyframes zoomIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes fadeUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── Setup Screen ── */
    #screen-setup {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #181510;
    }

    #screen-setup h2 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: #c8a96e;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .setup-columns {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      width: 100%;
      max-width: 820px;
      gap: 2rem;
    }

    .player-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(200, 169, 110, 0.2);
      border-radius: 6px;
      padding: 1.5rem 1rem;
    }

    .player-column h3 {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      color: #c8a96e;
      text-transform: uppercase;
    }

    .player-column input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0e0c09;
      border: 1px solid #5a4a30;
      border-radius: 4px;
      color: #f0e8d0;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-column input[type="text"]:focus {
      border-color: #c8a96e;
    }

    .player-column input[type="text"]::placeholder {
      color: #5a4a30;
    }

    .formation-cards {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
    }

    .formation-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem;
      background: #0e0c09;
      border: 2px solid #3a2e1a;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .formation-card:hover {
      border-color: #7a6040;
      background: #141008;
    }

    .formation-card.selected {
      border-color: #f4a261;
      background: #1a1005;
    }

    .formation-card span {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: #a08060;
      text-transform: uppercase;
    }

    .formation-card.selected span {
      color: #f4a261;
    }

    .formation-card canvas {
      display: block;
      border-radius: 3px;
    }

    #start-match {
      margin-top: 2rem;
      padding: 0.75rem 2.5rem;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f0e8d0;
      background: #3a2a10;
      border: 2px solid #c8a96e;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #start-match:hover {
      background: #c8a96e;
      color: #0e0c09;
    }

    /* ── Game Screen ── */
    #screen-game {
      align-items: center;
      justify-content: center;
      background: #0e1a0e;
    }

    #screen-game canvas {
      display: block;
      background: #2a4a2a;
      border: 3px solid #5a3e1b;
    }

    /* ── Win Screen ── */
    #screen-win {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }

    #screen-win h2 {
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.12em;
      color: #f0e8d0;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    #screen-win p {
      font-size: 1.2rem;
      color: #a08060;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <!-- Intro Screen -->
  <div id="screen-intro" class="screen">
    <h1>Futbolito</h1>
    <p>El juego del barrio</p>
  </div>

  <!-- Setup Screen -->
  <div id="screen-setup" class="screen">
    <h2>Match Setup</h2>
    <div class="setup-columns">
      <!-- Player 1 -->
      <div class="player-column" id="player1-col">
        <h3>Player 1</h3>
        <input type="text" id="player1-name" placeholder="Enter name" />
        <div class="formation-cards">
          <div class="formation-card" data-formation="4-3-3">
            <span>4-3-3</span>
            <canvas width="120" height="80"></canvas>
          </div>
          <div class="formation-card" data-formation="3-5-2">
            <span>3-5-2</span>
            <canvas width="120" height="80"></canvas>
          </div>
        </div>
      </div>
      <!-- Player 2 -->
      <div class="player-column" id="player2-col">
        <h3>Player 2</h3>
        <input type="text" id="player2-name" placeholder="Enter name" />
        <div class="formation-cards">
          <div class="formation-card" data-formation="4-3-3">
            <span>4-3-3</span>
            <canvas width="120" height="80"></canvas>
          </div>
          <div class="formation-card" data-formation="3-5-2">
            <span>3-5-2</span>
            <canvas width="120" height="80"></canvas>
          </div>
        </div>
      </div>
    </div>
    <button id="start-match">Start Match</button>
  </div>

  <!-- Game Screen -->
  <div id="screen-game" class="screen">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Win Screen -->
  <div id="screen-win" class="screen">
    <h2>Winner!</h2>
    <p>Final score goes here</p>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // CONFIG — game constants
    // ─────────────────────────────────────────────
    const CONFIG = {
      CANVAS_WIDTH: 900,
      CANVAS_HEIGHT: 600,
      MAX_SPEED: 18,
      MAX_DRAG_DISTANCE: 120,
      VELOCITY_THRESHOLD: 0.5,
    };

    // ─────────────────────────────────────────────
    // STATE — single source of truth
    // ─────────────────────────────────────────────
    const STATE = {
      playerNames: ['', ''],
      playerFormations: [null, null],
      scores: [0, 0],
      activePlayer: 0,
      turnStartTime: null,
      idleGlowActive: false,
      isDragging: false,
      dragCurrent: null,
      aimTarget: null,
      marbleDirty: false,
      marbleTrail: [],
      droppingContactHandled: false,
      celebrationActive: false,
      celebrationStartTime: null,
      celebrationTimer: null,
      confettiParticles: [],
      nailJumpActive: false,
      pendingWin: null,
      birdActive: false,
      birdFrame: 0,
      bird: { x: 0, y: 0, hasDropped: false },
      dropping: null,
      droppingTimer: null,
      boardSkin: null,
      ambientScene: null,
    };

    // ─────────────────────────────────────────────
    // Formations — normalized [0,1] coords per player half
    // ─────────────────────────────────────────────
    const Formations = {
      "4-3-3": [
        { x: 0.1, y: 0.5 },
        { x: 0.3, y: 0.2 }, { x: 0.3, y: 0.4 }, { x: 0.3, y: 0.6 }, { x: 0.3, y: 0.8 },
        { x: 0.55, y: 0.25 }, { x: 0.55, y: 0.5 }, { x: 0.55, y: 0.75 },
        { x: 0.75, y: 0.2 }, { x: 0.75, y: 0.5 }, { x: 0.75, y: 0.8 },
      ],
      "3-5-2": [
        { x: 0.1, y: 0.5 },
        { x: 0.3, y: 0.25 }, { x: 0.3, y: 0.5 }, { x: 0.3, y: 0.75 },
        { x: 0.52, y: 0.1 }, { x: 0.52, y: 0.3 }, { x: 0.52, y: 0.5 }, { x: 0.52, y: 0.7 }, { x: 0.52, y: 0.9 },
        { x: 0.75, y: 0.35 }, { x: 0.75, y: 0.65 },
      ],
    };

    // ─────────────────────────────────────────────
    // Screens — show/hide controller
    // ─────────────────────────────────────────────
    const Screens = {
      show(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        const target = document.getElementById(id);
        if (target) {
          target.style.display = 'flex';
        }
      }
    };

    // ─────────────────────────────────────────────
    // Canvas setup
    // ─────────────────────────────────────────────
    const canvas = document.getElementById('game-canvas');
    canvas.width = CONFIG.CANVAS_WIDTH;
    canvas.height = CONFIG.CANVAS_HEIGHT;
    const ctx = canvas.getContext('2d');

    // ─────────────────────────────────────────────
    // Physics engine — Matter.js
    // ─────────────────────────────────────────────
    const { Engine, Bodies, Body, Composite, Events } = Matter;

    const engine = Engine.create();
    engine.gravity.y = 0; // top-down view, no gravity
    const world = engine.world;

    // Walls — placed just outside canvas edges so marble bounces off internal border
    const wallTop    = Bodies.rectangle(CONFIG.CANVAS_WIDTH / 2, -10,           CONFIG.CANVAS_WIDTH + 40, 20, { isStatic: true, restitution: 0.6, label: 'wall-top' });
    const wallBottom = Bodies.rectangle(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT + 10, CONFIG.CANVAS_WIDTH + 40, 20, { isStatic: true, restitution: 0.6, label: 'wall-bottom' });
    const wallLeft   = Bodies.rectangle(-20, CONFIG.CANVAS_HEIGHT / 2,          20, CONFIG.CANVAS_HEIGHT + 40, { isStatic: true, restitution: 0.6, label: 'wall-left' });
    const wallRight  = Bodies.rectangle(CONFIG.CANVAS_WIDTH + 20, CONFIG.CANVAS_HEIGHT / 2, 20, CONFIG.CANVAS_HEIGHT + 40, { isStatic: true, restitution: 0.6, label: 'wall-right' });

    // Goal sensors — just inside each goal opening
    const goalP1 = Bodies.rectangle(8, CONFIG.CANVAS_HEIGHT / 2, 20, 60, { isStatic: true, isSensor: true, label: 'goal-p1' });
    const goalP2 = Bodies.rectangle(892, CONFIG.CANVAS_HEIGHT / 2, 20, 60, { isStatic: true, isSensor: true, label: 'goal-p2' });

    // Marble — exposed globally for console verification
    const marble = Bodies.circle(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 12, {
      restitution: 0.75,
      frictionAir: 0.015,
      label: 'marble',
    });

    // Add static bodies only (no nails yet — they're created in Game.init())
    Composite.add(world, [wallTop, wallBottom, wallLeft, wallRight, goalP1, goalP2, marble]);

    // Speed cap — enforced each frame
    const MAX_SPEED = CONFIG.MAX_SPEED;

    // ─────────────────────────────────────────────
    // Renderer — draw functions
    // ─────────────────────────────────────────────

    function drawBoard() {
      const W = CONFIG.CANVAS_WIDTH;
      const H = CONFIG.CANVAS_HEIGHT;
      const BORDER_INSET = 8;
      const GOAL_WIDTH = 60;
      const GOAL_HEIGHT = 20; // visual thickness of goal mouth cutout area

      // Fill board with worn-felt green
      ctx.fillStyle = '#2d5a1b';
      ctx.fillRect(0, 0, W, H);

      // Nylon string border — 4 lines 8px inside edges, off-white, lineWidth 3
      ctx.strokeStyle = '#e8dcc8';
      ctx.lineWidth = 3;

      const goalCenterY = H / 2;
      const goalHalf = GOAL_WIDTH / 2;

      // Top border — full width
      ctx.beginPath();
      ctx.moveTo(BORDER_INSET, BORDER_INSET);
      ctx.lineTo(W - BORDER_INSET, BORDER_INSET);
      ctx.stroke();

      // Bottom border — full width
      ctx.beginPath();
      ctx.moveTo(BORDER_INSET, H - BORDER_INSET);
      ctx.lineTo(W - BORDER_INSET, H - BORDER_INSET);
      ctx.stroke();

      // Left border — with goal cutout gap
      ctx.beginPath();
      ctx.moveTo(BORDER_INSET, BORDER_INSET);
      ctx.lineTo(BORDER_INSET, goalCenterY - goalHalf);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(BORDER_INSET, goalCenterY + goalHalf);
      ctx.lineTo(BORDER_INSET, H - BORDER_INSET);
      ctx.stroke();

      // Right border — with goal cutout gap
      ctx.beginPath();
      ctx.moveTo(W - BORDER_INSET, BORDER_INSET);
      ctx.lineTo(W - BORDER_INSET, goalCenterY - goalHalf);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(W - BORDER_INSET, goalCenterY + goalHalf);
      ctx.lineTo(W - BORDER_INSET, H - BORDER_INSET);
      ctx.stroke();

      // Goal mouth visual — draw a slightly darker rect inside the cutout so it reads as a pocket
      ctx.fillStyle = '#1a3a0a';
      // Left goal mouth
      ctx.fillRect(0, goalCenterY - goalHalf, BORDER_INSET + 4, GOAL_WIDTH);
      // Right goal mouth
      ctx.fillRect(W - BORDER_INSET - 4, goalCenterY - goalHalf, BORDER_INSET + 4, GOAL_WIDTH);

      // Center line — subtle dashed midfield line
      ctx.save();
      ctx.strokeStyle = 'rgba(232,220,200,0.2)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(W / 2, BORDER_INSET);
      ctx.lineTo(W / 2, H - BORDER_INSET);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawMarble() {
      const pos = marble.position;
      const r = 12;

      // Trail effect (stub — marbleDirty logic added later in item 3+)
      if (STATE.marbleDirty && STATE.marbleTrail.length > 0) {
        STATE.marbleTrail.forEach((p, i) => {
          const alpha = (i + 1) / STATE.marbleTrail.length * 0.35;
          ctx.beginPath();
          ctx.arc(p.x, p.y, r * 0.8, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(26, 58, 107, ${alpha})`;
          ctx.fill();
        });
      }

      // Radial gradient — glass effect
      const grad = ctx.createRadialGradient(pos.x - 4, pos.y - 4, 1, pos.x, pos.y, r);
      grad.addColorStop(0, 'rgba(255,255,255,0.95)');
      grad.addColorStop(0.3, 'rgba(180,210,255,0.8)');
      grad.addColorStop(0.7, '#3a6fcc');
      grad.addColorStop(1, '#1a3a6b');

      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Subtle specular rim
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawNails() {
      // Draws all nail bodies as grey circles
      const bodies = Composite.allBodies(world);
      bodies.forEach(body => {
        if (body.label !== 'nail') return;
        const pos = body.position;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#888';
        ctx.fill();
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    }

    // Stub functions — implemented in later items
    function drawAimLine()     {}
    function drawIdleGlow()    {}
    function drawCelebration() {}
    function drawBird()        {}

    // ─────────────────────────────────────────────
    // Game loop
    // ─────────────────────────────────────────────
    function gameLoop() {
      if (!Game._loopRunning) return;

      // Update physics
      Engine.update(engine, 1000 / 60);

      // Speed cap
      const vel = marble.velocity;
      const speed = Math.sqrt(vel.x ** 2 + vel.y ** 2);
      if (speed > MAX_SPEED) {
        const scale = MAX_SPEED / speed;
        Body.setVelocity(marble, { x: vel.x * scale, y: vel.y * scale });
      }

      // Clear and redraw
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBoard();
      drawNails();
      drawMarble();
      drawAimLine();
      drawIdleGlow();
      drawCelebration();
      drawBird();

      requestAnimationFrame(gameLoop);
    }

    // ─────────────────────────────────────────────
    // Game — init and loop control
    // ─────────────────────────────────────────────
    const Game = {
      _loopRunning: false,

      init() {
        // Clear existing nail bodies from world
        const nailBodies = Composite.allBodies(world).filter(b => b.label === 'nail');
        nailBodies.forEach(nail => Composite.remove(world, nail));

        // Create nail bodies for both players
        const halfWidth = CONFIG.CANVAS_WIDTH / 2;
        [STATE.playerFormations[0], STATE.playerFormations[1]].forEach((formKey, playerIdx) => {
          const coords = Formations[formKey];
          coords.forEach(coord => {
            let px, py;
            if (playerIdx === 0) {
              px = coord.x * halfWidth;
              py = coord.y * CONFIG.CANVAS_HEIGHT;
            } else {
              // Player 2 mirrored
              const mirroredX = 1 - coord.x;
              px = mirroredX * halfWidth + halfWidth;
              py = coord.y * CONFIG.CANVAS_HEIGHT;
            }
            const nail = Bodies.circle(px, py, 8, {
              isStatic: true,
              restitution: 0.7,
              label: 'nail',
            });
            Composite.add(world, nail);
          });
        });

        // Assign board skin and scene randomly
        STATE.boardSkin = Math.random() < 0.5 ? 'worn-felt' : 'rustic-wood';
        STATE.ambientScene = Math.random() < 0.5 ? 'backyard' : 'street-night';

        // Reset marble to center
        Body.setPosition(marble, { x: CONFIG.CANVAS_WIDTH / 2, y: CONFIG.CANVAS_HEIGHT / 2 });
        Body.setVelocity(marble, { x: 0, y: 0 });

        // Set initial turn state
        STATE.activePlayer = 0;
        STATE.turnStartTime = Date.now();
        STATE.scores = [0, 0];

        // Show game screen and start loop
        Screens.show('screen-game');
        if (!Game._loopRunning) {
          Game._loopRunning = true;
          gameLoop();
        }
      },
    };

    // ─────────────────────────────────────────────
    // Setup — formation preview + form handling
    // ─────────────────────────────────────────────
    const Setup = {
      selectedFormations: [null, null],

      init() {
        // Draw formation previews on all mini canvases
        document.querySelectorAll('.formation-card').forEach(card => {
          const formKey = card.dataset.formation;
          const miniCanvas = card.querySelector('canvas');
          this.drawPreview(miniCanvas, formKey);
        });

        // Formation card click handlers — Player 1
        document.querySelectorAll('#player1-col .formation-card').forEach(card => {
          card.addEventListener('click', () => {
            document.querySelectorAll('#player1-col .formation-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            Setup.selectedFormations[0] = card.dataset.formation;
          });
        });

        // Formation card click handlers — Player 2
        document.querySelectorAll('#player2-col .formation-card').forEach(card => {
          card.addEventListener('click', () => {
            document.querySelectorAll('#player2-col .formation-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            Setup.selectedFormations[1] = card.dataset.formation;
          });
        });

        // Start match button
        document.getElementById('start-match').addEventListener('click', () => {
          const name1 = document.getElementById('player1-name').value.trim();
          const name2 = document.getElementById('player2-name').value.trim();
          if (!name1 || !name2 || !Setup.selectedFormations[0] || !Setup.selectedFormations[1]) return;
          STATE.playerNames = [name1, name2];
          STATE.playerFormations = [...Setup.selectedFormations];
          Game.init();
        });
      },

      drawPreview(miniCanvas, formKey) {
        const ctx2 = miniCanvas.getContext('2d');
        ctx2.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
        ctx2.fillStyle = '#2d5a1b';
        ctx2.fillRect(0, 0, miniCanvas.width, miniCanvas.height);
        const coords = Formations[formKey];
        coords.forEach(coord => {
          ctx2.beginPath();
          ctx2.arc(coord.x * miniCanvas.width, coord.y * miniCanvas.height, 4, 0, Math.PI * 2);
          ctx2.fillStyle = '#888';
          ctx2.fill();
        });
      },
    };

    // ─────────────────────────────────────────────
    // Boot — show intro, wire click-through, init setup
    // ─────────────────────────────────────────────
    Screens.show('screen-intro');

    document.getElementById('screen-intro').addEventListener('click', () => {
      Screens.show('screen-setup');
    });

    Setup.init();

  </script>
</body>
</html>
