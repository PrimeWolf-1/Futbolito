<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futbolito</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      font-family: 'Georgia', serif;
      color: #f0e8d0;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── Intro Screen ── */
    #screen-intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }

    #screen-intro h1 {
      font-size: clamp(4rem, 12vw, 9rem);
      letter-spacing: 0.1em;
      color: #f0e8d0;
      text-transform: uppercase;
      text-shadow:
        0 0 20px rgba(240, 232, 208, 0.4),
        4px 4px 0px #5a3e1b;
      animation: zoomIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    #screen-intro p {
      margin-top: 1.2rem;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: #a08060;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    @keyframes zoomIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes fadeUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── Setup Screen ── */
    #screen-setup {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #181510;
    }

    #screen-setup h2 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: #c8a96e;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .setup-columns {
      display: flex;
      flex-direction: row;
      justify-content: space-around;
      width: 100%;
      max-width: 820px;
      gap: 2rem;
    }

    .player-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(200, 169, 110, 0.2);
      border-radius: 6px;
      padding: 1.5rem 1rem;
    }

    .player-column h3 {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      color: #c8a96e;
      text-transform: uppercase;
    }

    .player-column input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0e0c09;
      border: 1px solid #5a4a30;
      border-radius: 4px;
      color: #f0e8d0;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.2s;
    }

    .player-column input[type="text"]:focus {
      border-color: #c8a96e;
    }

    .player-column input[type="text"]::placeholder {
      color: #5a4a30;
    }

    .formation-cards {
      display: flex;
      flex-direction: row;
      gap: 0.75rem;
    }

    .formation-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem;
      background: #0e0c09;
      border: 2px solid #3a2e1a;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .formation-card:hover {
      border-color: #7a6040;
      background: #141008;
    }

    .formation-card.selected {
      border-color: #f4a261;
      background: #1a1005;
    }

    .formation-card span {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: #a08060;
      text-transform: uppercase;
    }

    .formation-card.selected span {
      color: #f4a261;
    }

    .formation-card canvas {
      display: block;
      border-radius: 3px;
    }

    #start-match {
      margin-top: 2rem;
      padding: 0.75rem 2.5rem;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f0e8d0;
      background: #3a2a10;
      border: 2px solid #c8a96e;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #start-match:hover {
      background: #c8a96e;
      color: #0e0c09;
    }

    /* ── Game Screen ── */
    #screen-game {
      position: relative;
      align-items: center;
      justify-content: center;
      background: #0e1a0e;
    }

    #scoreboard {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 1.4rem;
      padding: 6px 20px;
      border-radius: 6px;
      font-family: monospace;
      letter-spacing: 2px;
      pointer-events: none;
    }

    #screen-game canvas {
      display: block;
      background: #2a4a2a;
      border: 3px solid #5a3e1b;
    }

    /* ── Win Screen ── */
    #screen-win {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }

    #screen-win h2 {
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.12em;
      color: #f0e8d0;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    #screen-win p {
      font-size: 1.2rem;
      color: #a08060;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <!-- Intro Screen -->
  <div id="screen-intro" class="screen">
    <h1>Futbolito</h1>
    <p>El juego del barrio</p>
  </div>

  <!-- Setup Screen -->
  <div id="screen-setup" class="screen">
    <h2>Match Setup</h2>
    <div class="setup-columns">
      <!-- Player 1 -->
      <div class="player-column" id="player1-col">
        <h3>Player 1</h3>
        <input type="text" id="player1-name" placeholder="Enter name" />
        <div class="formation-cards">
          <div class="formation-card" data-formation="4-3-3">
            <span>4-3-3</span>
            <canvas width="120" height="80"></canvas>
          </div>
          <div class="formation-card" data-formation="3-5-2">
            <span>3-5-2</span>
            <canvas width="120" height="80"></canvas>
          </div>
        </div>
      </div>
      <!-- Player 2 -->
      <div class="player-column" id="player2-col">
        <h3>Player 2</h3>
        <input type="text" id="player2-name" placeholder="Enter name" />
        <div class="formation-cards">
          <div class="formation-card" data-formation="4-3-3">
            <span>4-3-3</span>
            <canvas width="120" height="80"></canvas>
          </div>
          <div class="formation-card" data-formation="3-5-2">
            <span>3-5-2</span>
            <canvas width="120" height="80"></canvas>
          </div>
        </div>
      </div>
    </div>
    <button id="start-match">Start Match</button>
  </div>

  <!-- Game Screen -->
  <div id="screen-game" class="screen">
    <div id="scoreboard"></div>
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Win Screen -->
  <div id="screen-win" class="screen">
    <h2>Winner!</h2>
    <p>Final score goes here</p>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // CONFIG — game constants
    // ─────────────────────────────────────────────
    const CONFIG = {
      CANVAS_WIDTH: 900,
      CANVAS_HEIGHT: 600,
      MAX_SPEED: 30,
      MAX_DRAG_DISTANCE: 120,
      VELOCITY_THRESHOLD: 0.5,
    };

    // ─────────────────────────────────────────────
    // STATE — single source of truth
    // ─────────────────────────────────────────────
    const STATE = {
      playerNames: ['', ''],
      playerFormations: [null, null],
      scores: [0, 0],
      activePlayer: 0,
      turnStartTime: null,
      idleGlowActive: false,
      isDragging: false,
      dragCurrent: null,
      aimTarget: null,
      marbleDirty: false,
      marbleWasMoving: false,
      marbleTrail: [],
      droppingContactHandled: false,
      celebrationActive: false,
      celebrationStartTime: null,
      celebrationTimer: null,
      confettiParticles: [],
      nailJumpActive: false,
      pendingWin: null,
      birdActive: false,
      birdFrame: 0,
      bird: { x: 0, y: 0, hasDropped: false },
      dropping: null,
      droppingTimer: null,
      boardSkin: null,
      ambientScene: null,
    };

    // ─────────────────────────────────────────────
    // Formations — normalized [0,1] coords per player half
    // ─────────────────────────────────────────────
    const Formations = {
      "4-3-3": [
        { x: 0.1, y: 0.5 },
        { x: 0.3, y: 0.2 }, { x: 0.3, y: 0.4 }, { x: 0.3, y: 0.6 }, { x: 0.3, y: 0.8 },
        { x: 0.55, y: 0.25 }, { x: 0.55, y: 0.5 }, { x: 0.55, y: 0.75 },
        { x: 0.75, y: 0.2 }, { x: 0.75, y: 0.5 }, { x: 0.75, y: 0.8 },
      ],
      "3-5-2": [
        { x: 0.1, y: 0.5 },
        { x: 0.3, y: 0.25 }, { x: 0.3, y: 0.5 }, { x: 0.3, y: 0.75 },
        { x: 0.52, y: 0.1 }, { x: 0.52, y: 0.3 }, { x: 0.52, y: 0.5 }, { x: 0.52, y: 0.7 }, { x: 0.52, y: 0.9 },
        { x: 0.75, y: 0.35 }, { x: 0.75, y: 0.65 },
      ],
    };

    // ─────────────────────────────────────────────
    // Screens — show/hide controller
    // ─────────────────────────────────────────────
    const Screens = {
      show(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        const target = document.getElementById(id);
        if (target) {
          target.style.display = 'flex';
        }
      }
    };

    // ─────────────────────────────────────────────
    // Canvas setup
    // ─────────────────────────────────────────────
    const canvas = document.getElementById('game-canvas');
    canvas.width = CONFIG.CANVAS_WIDTH;
    canvas.height = CONFIG.CANVAS_HEIGHT;
    const ctx = canvas.getContext('2d');

    // ─────────────────────────────────────────────
    // Grain texture — generated once into offscreen canvas
    // ─────────────────────────────────────────────
    const grainCanvas = document.createElement('canvas');
    grainCanvas.width = CONFIG.CANVAS_WIDTH;
    grainCanvas.height = CONFIG.CANVAS_HEIGHT;
    const grainCtx = grainCanvas.getContext('2d');
    for (let i = 0; i < 1200; i++) {
      const gx = Math.random() * CONFIG.CANVAS_WIDTH;
      const gy = Math.random() * CONFIG.CANVAS_HEIGHT;
      grainCtx.beginPath();
      grainCtx.arc(gx, gy, Math.random() * 1.5, 0, Math.PI * 2);
      grainCtx.fillStyle = `rgba(0,0,0,${Math.random() * 0.1})`;
      grainCtx.fill();
    }

    // ─────────────────────────────────────────────
    // Physics engine — Matter.js
    // ─────────────────────────────────────────────
    const { Engine, Bodies, Body, Composite, Events } = Matter;

    const engine = Engine.create();
    engine.gravity.y = 0; // top-down view, no gravity
    const world = engine.world;

    // Walls — placed just outside canvas edges so marble bounces off internal border
    const wallTop    = Bodies.rectangle(CONFIG.CANVAS_WIDTH / 2, -10,           CONFIG.CANVAS_WIDTH + 40, 20, { isStatic: true, restitution: 0.6, label: 'wall-top' });
    const wallBottom = Bodies.rectangle(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT + 10, CONFIG.CANVAS_WIDTH + 40, 20, { isStatic: true, restitution: 0.6, label: 'wall-bottom' });
    const wallLeft   = Bodies.rectangle(-20, CONFIG.CANVAS_HEIGHT / 2,          20, CONFIG.CANVAS_HEIGHT + 40, { isStatic: true, restitution: 0.6, label: 'wall-left' });
    const wallRight  = Bodies.rectangle(CONFIG.CANVAS_WIDTH + 20, CONFIG.CANVAS_HEIGHT / 2, 20, CONFIG.CANVAS_HEIGHT + 40, { isStatic: true, restitution: 0.6, label: 'wall-right' });

    // Goal sensors — just inside each goal opening
    const goalP1 = Bodies.rectangle(8, CONFIG.CANVAS_HEIGHT / 2, 20, 60, { isStatic: true, isSensor: true, label: 'goal-p1' });
    const goalP2 = Bodies.rectangle(892, CONFIG.CANVAS_HEIGHT / 2, 20, 60, { isStatic: true, isSensor: true, label: 'goal-p2' });

    // Marble — exposed globally for console verification
    const marble = Bodies.circle(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 12, {
      restitution: 0.75,
      frictionAir: 0.015,
      label: 'marble',
    });

    // Add static bodies only (no nails yet — they're created in Game.init())
    Composite.add(world, [wallTop, wallBottom, wallLeft, wallRight, goalP1, goalP2, marble]);

    // Speed cap — enforced each frame
    const MAX_SPEED = CONFIG.MAX_SPEED;

    // ─────────────────────────────────────────────
    // Renderer — draw functions
    // ─────────────────────────────────────────────

    function drawStringSegment(ctx, x1, y1, x2, y2) {
      // Shadow
      ctx.beginPath();
      ctx.moveTo(x1 + 1, y1 + 1);
      ctx.lineTo(x2 + 1, y2 + 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 4;
      ctx.stroke();

      // String body
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = '#d4c9a8';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Highlight
      ctx.beginPath();
      ctx.moveTo(x1 - 0.5, y1 - 0.5);
      ctx.lineTo(x2 - 0.5, y2 - 0.5);
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawStringBorder() {
      const pad = 12;
      const cy = CONFIG.CANVAS_HEIGHT / 2;
      const W = CONFIG.CANVAS_WIDTH;
      const H = CONFIG.CANVAS_HEIGHT;

      // Top border
      drawStringSegment(ctx, pad, pad, W - pad, pad);
      // Bottom border
      drawStringSegment(ctx, pad, H - pad, W - pad, H - pad);
      // Left border (split around goal)
      drawStringSegment(ctx, pad, pad, pad, cy - 30);
      drawStringSegment(ctx, pad, cy + 30, pad, H - pad);
      // Right border (split around goal)
      drawStringSegment(ctx, W - pad, pad, W - pad, cy - 30);
      drawStringSegment(ctx, W - pad, cy + 30, W - pad, H - pad);

      // Goal mouth posts — metallic circles at each goal corner
      [[pad, cy - 30], [pad, cy + 30]].forEach(([px, py]) => {
        const postGrad = ctx.createRadialGradient(px - 2, py - 2, 1, px, py, 5);
        postGrad.addColorStop(0, '#d0c8b8');
        postGrad.addColorStop(1, '#6a6050');
        ctx.beginPath();
        ctx.arc(px, py, 5, 0, Math.PI * 2);
        ctx.fillStyle = postGrad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      [[W - pad, cy - 30], [W - pad, cy + 30]].forEach(([px, py]) => {
        const postGrad = ctx.createRadialGradient(px - 2, py - 2, 1, px, py, 5);
        postGrad.addColorStop(0, '#d0c8b8');
        postGrad.addColorStop(1, '#6a6050');
        ctx.beginPath();
        ctx.arc(px, py, 5, 0, Math.PI * 2);
        ctx.fillStyle = postGrad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
    }

    function drawFieldLines() {
      const W = CONFIG.CANVAS_WIDTH;
      const H = CONFIG.CANVAS_HEIGHT;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.5;

      // Center line (vertical)
      ctx.beginPath();
      ctx.moveTo(450, 30);
      ctx.lineTo(450, 570);
      ctx.stroke();

      // Center circle
      ctx.beginPath();
      ctx.arc(450, 300, 60, 0, Math.PI * 2);
      ctx.stroke();

      // Center spot
      ctx.beginPath();
      ctx.arc(450, 300, 4, 0, Math.PI * 2);
      ctx.fill();

      // Left penalty area
      ctx.beginPath();
      ctx.strokeRect(30, 180, 130, 240);

      // Right penalty area
      ctx.beginPath();
      ctx.strokeRect(740, 180, 130, 240);

      // Left goal area (6-yard box)
      ctx.beginPath();
      ctx.strokeRect(30, 240, 60, 120);

      // Right goal area
      ctx.beginPath();
      ctx.strokeRect(810, 240, 60, 120);

      // Left penalty spot
      ctx.beginPath();
      ctx.arc(120, 300, 3, 0, Math.PI * 2);
      ctx.fill();

      // Right penalty spot
      ctx.beginPath();
      ctx.arc(780, 300, 3, 0, Math.PI * 2);
      ctx.fill();

      // Corner arcs
      // Top-left
      ctx.beginPath();
      ctx.arc(30, 30, 15, 0, Math.PI / 2);
      ctx.stroke();
      // Top-right
      ctx.beginPath();
      ctx.arc(W - 30, 30, 15, Math.PI / 2, Math.PI);
      ctx.stroke();
      // Bottom-left
      ctx.beginPath();
      ctx.arc(30, H - 30, 15, -Math.PI / 2, 0);
      ctx.stroke();
      // Bottom-right
      ctx.beginPath();
      ctx.arc(W - 30, H - 30, 15, Math.PI, Math.PI * 1.5);
      ctx.stroke();

      ctx.restore();
    }

    function drawBoard() {
      const W = CONFIG.CANVAS_WIDTH;
      const H = CONFIG.CANVAS_HEIGHT;
      const GOAL_WIDTH = 60;

      // Fill board with worn-felt green
      ctx.fillStyle = '#2d5a1b';
      ctx.fillRect(0, 0, W, H);

      // Grain texture
      ctx.drawImage(grainCanvas, 0, 0);

      // Field lines (under nails/marble)
      drawFieldLines();

      // Goal mouth visual — draw a slightly darker rect inside each cutout
      const goalCenterY = H / 2;
      ctx.fillStyle = '#1a3a0a';
      ctx.fillRect(0, goalCenterY - GOAL_WIDTH / 2, 16, GOAL_WIDTH);
      ctx.fillRect(W - 16, goalCenterY - GOAL_WIDTH / 2, 16, GOAL_WIDTH);

      // Nylon string border
      drawStringBorder();
    }

    function drawMarble() {
      const pos = marble.position;
      const r = 12;

      // Trail effect (stub — marbleDirty logic added later in item 3+)
      if (STATE.marbleDirty && STATE.marbleTrail.length > 0) {
        STATE.marbleTrail.forEach((p, i) => {
          const alpha = (i + 1) / STATE.marbleTrail.length * 0.35;
          ctx.beginPath();
          ctx.arc(p.x, p.y, r * 0.8, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(26, 58, 107, ${alpha})`;
          ctx.fill();
        });
      }

      // Radial gradient — glass effect
      const grad = ctx.createRadialGradient(pos.x - 4, pos.y - 4, 1, pos.x, pos.y, r);
      grad.addColorStop(0, 'rgba(255,255,255,0.95)');
      grad.addColorStop(0.3, 'rgba(180,210,255,0.8)');
      grad.addColorStop(0.7, '#3a6fcc');
      grad.addColorStop(1, '#1a3a6b');

      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Subtle specular rim
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawNails() {
      const bodies = Composite.allBodies(world);
      bodies.forEach(body => {
        if (body.label !== 'nail') return;

        const x = body.position.x;
        const y = body.position.y;
        const r = 10; // visual radius (slightly bigger than physics radius 8)

        // Determine team color
        const isP2 = body.playerIndex === 1;
        const colorLight = isP2 ? '#e07a7a' : '#7ab3e0';
        const colorDark  = isP2 ? '#7a1a1a' : '#1a4a7a';
        const colorMid   = isP2 ? '#c04040' : '#2a6aaa';

        // 1. Wood dent/shadow around nail base
        ctx.beginPath();
        ctx.arc(x, y, r + 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fill();

        // 2. Nail shank shadow (small offset ellipse)
        ctx.save();
        ctx.translate(x + 2, y + 3);
        ctx.scale(1, 0.4);
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fill();
        ctx.restore();

        // 3. Nail head — radial gradient
        const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 1, x, y, r);
        grad.addColorStop(0, colorLight);
        grad.addColorStop(0.5, colorMid);
        grad.addColorStop(1, colorDark);
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // 4. Nail head rim (thin dark stroke)
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 5. Highlight glint
        ctx.beginPath();
        ctx.arc(x - r * 0.35, y - r * 0.35, r * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fill();
      });
    }

    function drawAimLine() {
      if (!STATE.isDragging || !STATE.aimTarget) return;
      ctx.save();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(marble.position.x, marble.position.y);
      ctx.lineTo(STATE.aimTarget.x, STATE.aimTarget.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawIdleGlow() {
      if (!STATE.idleGlowActive) return;
      const pulse = 0.4 + 0.4 * Math.sin(Date.now() / 200);
      ctx.beginPath();
      ctx.arc(marble.position.x, marble.position.y, 20, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(80, 220, 80, ${pulse})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    function drawCelebration() {}
    function drawBird()        {}

    // ─────────────────────────────────────────────
    // Game loop
    // ─────────────────────────────────────────────
    function gameLoop() {
      if (!Game._loopRunning) return;

      // Update physics
      Engine.update(engine, 1000 / 60);

      // Speed cap
      const vel = marble.velocity;
      const speed = Math.sqrt(vel.x ** 2 + vel.y ** 2);
      if (speed > MAX_SPEED) {
        const scale = MAX_SPEED / speed;
        Body.setVelocity(marble, { x: vel.x * scale, y: vel.y * scale });
      }

      // Turn flow — track marble movement and switch turns when it stops
      if (speed > CONFIG.VELOCITY_THRESHOLD && !STATE.isDragging) {
        STATE.marbleWasMoving = true;
      }
      if (STATE.marbleWasMoving && speed < CONFIG.VELOCITY_THRESHOLD && !STATE.isDragging) {
        STATE.marbleWasMoving = false;
        Game.endTurn();
      }

      // Idle check — glow after 5 seconds of inactivity
      if (STATE.turnStartTime && Date.now() - STATE.turnStartTime > 5000 && !STATE.isDragging) {
        STATE.idleGlowActive = true;
      }

      // Clear and redraw
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBoard();
      drawNails();
      drawMarble();
      drawAimLine();
      drawIdleGlow();
      drawCelebration();
      drawBird();

      requestAnimationFrame(gameLoop);
    }

    // ─────────────────────────────────────────────
    // Game — init and loop control
    // ─────────────────────────────────────────────
    const Game = {
      _loopRunning: false,

      init() {
        // Clear existing nail bodies from world
        const nailBodies = Composite.allBodies(world).filter(b => b.label === 'nail');
        nailBodies.forEach(nail => Composite.remove(world, nail));

        // Create nail bodies for both players
        const halfWidth = CONFIG.CANVAS_WIDTH / 2;
        [STATE.playerFormations[0], STATE.playerFormations[1]].forEach((formKey, playerIdx) => {
          const coords = Formations[formKey];
          coords.forEach(coord => {
            let px, py;
            if (playerIdx === 0) {
              px = coord.x * halfWidth;
              py = coord.y * CONFIG.CANVAS_HEIGHT;
            } else {
              // Player 2 mirrored
              const mirroredX = 1 - coord.x;
              px = mirroredX * halfWidth + halfWidth;
              py = coord.y * CONFIG.CANVAS_HEIGHT;
            }
            const nail = Bodies.circle(px, py, 8, {
              isStatic: true,
              restitution: 0.7,
              label: 'nail',
            });
            nail.playerIndex = playerIdx;
            Composite.add(world, nail);
          });
        });

        // Assign board skin and scene randomly
        STATE.boardSkin = Math.random() < 0.5 ? 'worn-felt' : 'rustic-wood';
        STATE.ambientScene = Math.random() < 0.5 ? 'backyard' : 'street-night';

        // Reset marble to center
        Body.setPosition(marble, { x: CONFIG.CANVAS_WIDTH / 2, y: CONFIG.CANVAS_HEIGHT / 2 });
        Body.setVelocity(marble, { x: 0, y: 0 });

        // Set initial turn state
        STATE.activePlayer = 0;
        STATE.turnStartTime = Date.now();
        STATE.scores = [0, 0];

        // Update scoreboard
        document.getElementById('scoreboard').textContent = `${STATE.playerNames[0]} 0 — ${STATE.playerNames[1]} 0`;

        // Show game screen and start loop
        Screens.show('screen-game');
        if (!Game._loopRunning) {
          Game._loopRunning = true;
          gameLoop();
        }
      },

      endTurn() {
        STATE.marbleDirty = false;
        STATE.activePlayer = 1 - STATE.activePlayer;
        STATE.turnStartTime = Date.now();
        STATE.idleGlowActive = false;
        Body.set(marble, 'frictionAir', 0.015);
        STATE.droppingContactHandled = false;
      },

      onGoal(scoringPlayer) {
        if (STATE.celebrationActive) return; // prevent double-trigger
        STATE.scores[scoringPlayer - 1]++;
        // Update scoreboard immediately
        document.getElementById('scoreboard').textContent =
          `${STATE.playerNames[0]} ${STATE.scores[0]} — ${STATE.playerNames[1]} ${STATE.scores[1]}`;
        // Trigger celebration (stub until item 6)
        Celebration.trigger(scoringPlayer);
        // Check win condition (item 7)
        if (STATE.scores[scoringPlayer - 1] >= 3) {
          STATE.pendingWin = scoringPlayer;
        }
      },
    };

    // ─────────────────────────────────────────────
    // Celebration — stub (item 6 will implement fully)
    // ─────────────────────────────────────────────
    const Celebration = {
      trigger(player) {}
    };

    // ─────────────────────────────────────────────
    // Goal detection — collision event listener
    // ─────────────────────────────────────────────
    Matter.Events.on(engine, 'collisionStart', (event) => {
      event.pairs.forEach(pair => {
        const labels = [pair.bodyA.label, pair.bodyB.label];
        if (labels.includes('marble') && labels.includes('goal-p1')) {
          Game.onGoal(2); // P2 scores when marble enters P1's goal (left end)
        }
        if (labels.includes('marble') && labels.includes('goal-p2')) {
          Game.onGoal(1); // P1 scores when marble enters P2's goal (right end)
        }
      });
    });

    // ─────────────────────────────────────────────
    // Slingshot — mouse input handlers
    // ─────────────────────────────────────────────
    canvas.addEventListener('mousedown', (e) => {
      if (!Game._loopRunning) return;

      // Only allow drag if marble is not already moving
      const vel = marble.velocity;
      const speed = Math.sqrt(vel.x ** 2 + vel.y ** 2);
      if (speed >= CONFIG.VELOCITY_THRESHOLD) return;

      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const dx = mouseX - marble.position.x;
      const dy = mouseY - marble.position.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < marble.circleRadius + 4) {
        STATE.isDragging = true;
        STATE.dragStart = { x: marble.position.x, y: marble.position.y };
        STATE.dragCurrent = { x: mouseX, y: mouseY };
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!STATE.isDragging) return;

      const rect = canvas.getBoundingClientRect();
      STATE.dragCurrent = { x: e.clientX - rect.left, y: e.clientY - rect.top };

      const aimVector = {
        x: marble.position.x - STATE.dragCurrent.x,
        y: marble.position.y - STATE.dragCurrent.y,
      };
      let magnitude = Math.sqrt(aimVector.x ** 2 + aimVector.y ** 2);

      if (magnitude > CONFIG.MAX_DRAG_DISTANCE) {
        const scale = CONFIG.MAX_DRAG_DISTANCE / magnitude;
        aimVector.x *= scale;
        aimVector.y *= scale;
        magnitude = CONFIG.MAX_DRAG_DISTANCE;
      }

      STATE.aimTarget = {
        x: marble.position.x + aimVector.x,
        y: marble.position.y + aimVector.y,
      };
    });

    canvas.addEventListener('mouseup', (e) => {
      if (!STATE.isDragging) return;

      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const aimVector = {
        x: marble.position.x - mouseX,
        y: marble.position.y - mouseY,
      };
      let magnitude = Math.sqrt(aimVector.x ** 2 + aimVector.y ** 2);

      if (magnitude > CONFIG.MAX_DRAG_DISTANCE) {
        const scale = CONFIG.MAX_DRAG_DISTANCE / magnitude;
        aimVector.x *= scale;
        aimVector.y *= scale;
        magnitude = CONFIG.MAX_DRAG_DISTANCE;
      }

      if (magnitude > 0) {
        const power = Math.min(magnitude / CONFIG.MAX_DRAG_DISTANCE, 1.0);
        const speed = power * CONFIG.MAX_SPEED;
        const velocity = {
          x: (aimVector.x / magnitude) * speed,
          y: (aimVector.y / magnitude) * speed,
        };
        Body.setVelocity(marble, velocity);
        STATE.marbleDirty = true;
      }

      STATE.isDragging = false;
      STATE.idleGlowActive = false;
      STATE.dragCurrent = null;
      STATE.aimTarget = null;
      STATE.turnStartTime = Date.now(); // reset idle timer on each shot
    });

    // ─────────────────────────────────────────────
    // Setup — formation preview + form handling
    // ─────────────────────────────────────────────
    const Setup = {
      selectedFormations: [null, null],

      init() {
        // Draw formation previews on all mini canvases
        document.querySelectorAll('.formation-card').forEach(card => {
          const formKey = card.dataset.formation;
          const miniCanvas = card.querySelector('canvas');
          this.drawPreview(miniCanvas, formKey);
        });

        // Formation card click handlers — Player 1
        document.querySelectorAll('#player1-col .formation-card').forEach(card => {
          card.addEventListener('click', () => {
            document.querySelectorAll('#player1-col .formation-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            Setup.selectedFormations[0] = card.dataset.formation;
          });
        });

        // Formation card click handlers — Player 2
        document.querySelectorAll('#player2-col .formation-card').forEach(card => {
          card.addEventListener('click', () => {
            document.querySelectorAll('#player2-col .formation-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            Setup.selectedFormations[1] = card.dataset.formation;
          });
        });

        // Start match button
        document.getElementById('start-match').addEventListener('click', () => {
          const name1 = document.getElementById('player1-name').value.trim();
          const name2 = document.getElementById('player2-name').value.trim();
          if (!name1 || !name2 || !Setup.selectedFormations[0] || !Setup.selectedFormations[1]) return;
          STATE.playerNames = [name1, name2];
          STATE.playerFormations = [...Setup.selectedFormations];
          Game.init();
        });
      },

      drawPreview(miniCanvas, formKey) {
        const ctx2 = miniCanvas.getContext('2d');
        ctx2.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
        ctx2.fillStyle = '#2d5a1b';
        ctx2.fillRect(0, 0, miniCanvas.width, miniCanvas.height);
        const coords = Formations[formKey];
        coords.forEach(coord => {
          ctx2.beginPath();
          ctx2.arc(coord.x * miniCanvas.width, coord.y * miniCanvas.height, 4, 0, Math.PI * 2);
          ctx2.fillStyle = '#888';
          ctx2.fill();
        });
      },
    };

    // ─────────────────────────────────────────────
    // Boot — show intro, wire click-through, init setup
    // ─────────────────────────────────────────────
    Screens.show('screen-intro');

    document.getElementById('screen-intro').addEventListener('click', () => {
      Screens.show('screen-setup');
    });

    Setup.init();

  </script>
</body>
</html>
